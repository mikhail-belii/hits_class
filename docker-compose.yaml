services:
  postgres:
    image: postgres:16-alpine
    container_name: hits_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hits_class_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hits_class_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 500m

  app:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: hits_app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hits_class_db}
      SERVER_PORT: "8079"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    ports:
      - "127.0.0.1:8079:8079"
    volumes:
      - ./:/app
      - m2repo:/root/.m2
    command: mvn -DskipTests spring-boot:run
    restart: unless-stopped
    mem_limit: 550m

volumes:
  pgdata:
  m2repo: